name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # All three runners are pinned. `*-latest` rolls underneath the
        # `Swatinem/rust-cache` key (rustc + Cargo.lock hash, no runner
        # fingerprint), so a new VS/Xcode silently invalidates the
        # cached cmake build dirs and CI breaks until the cache is
        # cleared. Pinning means cache invalidation only happens when
        # you bump these versions on purpose. ubuntu-22.04 also gives a
        # binary that runs on older distros (RHEL 9, Debian stable);
        # ubuntu-latest's gcc 13 had a Mesa FBO regression.
        os: [ubuntu-22.04, macos-15, windows-2022]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}

      - name: Install Linux system deps
        # raylib's bundled glfw needs X11 dev headers to build on Linux.
        # libasound2-dev for audio, libudev-dev for gamepad/input.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libudev-dev \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev

      - name: Install Windows zlib for freetype-sys
        # freetype-sys 0.23.0's bundled FreeType build also compiles
        # libpng, which #includes zlib.h. Its build.rs hardcodes
        # `-I libz-sys/src/zlib` as a relative path that doesn't exist
        # in registry-based cargo builds, so cl.exe can't find zlib.h
        # on Windows. Install zlib via the preinstalled vcpkg and add
        # its include dir to CFLAGS so cl finds the header alongside
        # the broken hardcoded path.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install zlib:x64-windows-static-md
          echo "CFLAGS_x86_64_pc_windows_msvc=-IC:\vcpkg\installed\x64-windows-static-md\include" `
            | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Fmt
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

      - name: Release build
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: usagi-${{ matrix.os }}
          path: |
            target/release/usagi
            target/release/usagi.exe
          if-no-files-found: ignore

  web:
    name: emscripten
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten

      - uses: Swatinem/rust-cache@v2
        with:
          # Bump the suffix to discard a poisoned cache. Past failure:
          # a cached `target/release/build/<crate>/build-script-build`
          # was linked against glibc 2.39 (newer runner image) and
          # failed to load on the pinned ubuntu-22.04 (glibc 2.35).
          # Surfaced only when a config change invalidated the wasm
          # fingerprint and forced cargo to re-run those host scripts.
          shared-key: emscripten-v2

      - uses: mymindstorm/setup-emsdk@v14
        with:
          # Pinned: `latest` started shipping a wasm-opt whose --asyncify pass
          # fails ("__asyncify_get_call_index does not exist") on wasm built
          # with -fwasm-exceptions. We need both. 5.0.6 is the version
          # documented as verified in DEVELOPING.md.
          version: 5.0.6
          actions-cache-folder: emsdk-cache

      - name: Clear stale raylib CMake cache
        # rust-cache restores target/, which includes raylib's CMake build
        # dir. The cached `CMakeCache.txt` hardcodes the emsdk path, but
        # `mymindstorm/setup-emsdk` extracts emsdk to a fresh
        # `/home/runner/work/_temp/<uuid>/emsdk-main` on each run, so the
        # cached path no longer exists and CMake fails its include lookup.
        # Wiping the build dir forces CMake to reconfigure against the
        # current run's emsdk install.
        run: rm -rf target/wasm32-unknown-emscripten/release/build/sola-raylib-sys-*

      - name: Build wasm runtime (release)
        # Mirrors `just build-web-release`: see docs/web-build.md for the
        # wasm-eh ABI rationale. EMCC_CFLAGS is read by every emcc invocation,
        # including raylib's CMake build.
        env:
          EMCC_CFLAGS: -fwasm-exceptions -sSUPPORT_LONGJMP=wasm -s USE_LIBPNG=1 -s USE_OGG=1 -s USE_VORBIS=1
        run: cargo build --release --target wasm32-unknown-emscripten

      - name: Upload wasm runtime
        uses: actions/upload-artifact@v4
        with:
          name: usagi-wasm
          path: |
            target/wasm32-unknown-emscripten/release/usagi.js
            target/wasm32-unknown-emscripten/release/usagi.wasm
